name: Enforce Branch Protection (Prod)

on:
  push:
    branches:
      - prod

permissions:
  contents: read

jobs:
  # ============================================================================
  # Reject direct pushes to prod branch
  # ============================================================================
  reject-direct-push:
    runs-on: ubuntu-latest
    steps:
      - name: Fail on direct push to prod
        run: |
          echo "❌ Direct pushes to 'prod' branch are FORBIDDEN!"
          echo ""
          echo "Deployment workflow: Use pull requests instead"
          echo "1. Create a PR from 'main' → 'prod'"
          echo "2. Request approval from code owners"
          echo "3. Merge the PR to trigger deployment"
          echo ""
          echo "This ensures all prod deployments are reviewed and traceable."
          exit 1
