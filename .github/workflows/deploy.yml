name: Deploy Resume App

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infrastructure/**' # Run if infra changes

permissions:
  id-token: write
  contents: read

jobs:
  # JOB 1: DEFINE ENVIRONMENT (Prod vs Test)
  define-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-env.outputs.env_name }}
    steps:
      - id: set-env
        run: |
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=test" >> $GITHUB_OUTPUT
          fi

  # JOB 2: DEPLOY NETWORKING (Layer 0)
  # Must run first. Sets up VPC, Subnets, and Load Balancer.
  deploy-networking:
    needs: define-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Networking Stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/networking.yaml \
            --stack-name resume-networking-${{ needs.define-env.outputs.env_name }} \
            --parameter-overrides Environment=${{ needs.define-env.outputs.env_name }}

  # JOB 3: DEPLOY BACKEND (Layer 1)
  # Depends on Networking. Deploys Lambda & DB.
  deploy-backend:
    needs: [define-env, deploy-networking]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM Build
        run: |
          # Build using the new template location
          sam build --template-file infrastructure/backend-service.yaml

      - name: SAM Deploy
        run: |
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name resume-backend-${{ needs.define-env.outputs.env_name }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides Environment=${{ needs.define-env.outputs.env_name }} \
            --resolve-s3

  # JOB 4: DEPLOY FRONTEND (Layer 2)
  # Depends on Backend. Builds Docker -> ECR -> Fargate.
  deploy-frontend:
    needs: [define-env, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 1. Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 2. Get Backend URL (For the Docker Build)
      - name: Get Backend API URL
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name resume-backend-${{ needs.define-env.outputs.env_name }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "BACKEND_URL=$API_URL" >> $GITHUB_ENV

      # 3. Build & Push Docker Image
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: resume-frontend-${{ needs.define-env.outputs.env_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Ensure repo exists (idempotent)
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || aws ecr create-repository --repository-name $ECR_REPOSITORY

          # Build Production Image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -f frontend/Dockerfile.prod \
            --build-arg BACKEND_URL=${{ env.BACKEND_URL }} \
            ./frontend

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      # 4. Deploy Fargate Service
      - name: Deploy Frontend Infrastructure
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/frontend-service.yaml \
            --stack-name resume-frontend-${{ needs.define-env.outputs.env_name }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              ImageUrl=${{ env.IMAGE_URI }} \
              BackendApiUrl=${{ env.BACKEND_URL }} \
              Environment=${{ needs.define-env.outputs.env_name }}