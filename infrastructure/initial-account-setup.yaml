AWSTemplateFormatVersion: 2010-09-09
Description: >
  Initial account setup for hojadevida-izador:
  - GitHub OIDC Provider and Role for CI/CD
  - ECR Repository for frontend Docker images
  - Terraform state S3 buckets (dev & prod)
  - Terraform state DynamoDB lock tables (dev & prod)
  - API Gateway endpoints (dev & prod)

Parameters:
  GitHubOrg:
    Type: String
    Description: The GitHub organization name
    Default: estanixx
  GitHubRepo:
    Type: String
    Description: The GitHub repository name
    Default: hojadevida-izador
  ECRRepositoryName:
    Type: String
    Description: Name of the ECR repository for the frontend application
    Default: hojadevida-frontend
  AccountId:
    Type: String
    Description: AWS Account ID
    Default: '871696174477'

Resources:
  # ============================================================================
  # 1. GitHub OIDC Provider and Role for CI/CD
  # ============================================================================

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com

  GitHubOIDCProviderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubOIDCRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # ============================================================================
  # 2. ECR Repository for Frontend
  # ============================================================================

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ECRRepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true

  # ============================================================================
  # 3. Terraform State Infrastructure (Dev & Prod)
  # ============================================================================

  # Dev Environment State Bucket
  TerraformStateDevBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'hojadevida-terraform-state-${AccountId}-dev'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Prod Environment State Bucket
  TerraformStateProdBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'hojadevida-terraform-state-${AccountId}-prod'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Dev Environment DynamoDB Lock Table
  TerraformLocksDevTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'hojadevida-terraform-locks-${AccountId}-dev'
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # Prod Environment DynamoDB Lock Table
  TerraformLocksProdTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'hojadevida-terraform-locks-${AccountId}-prod'
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # ============================================================================
  # 4. API Gateway Endpoints (Dev & Prod)
  # ============================================================================
  # NOTE: API Gateways are now managed by AWS SAM (backend/template.yaml)
  # SAM creates API Gateways with Lambda integrations for backend services.
  # This allows SAM to own the complete backend stack (Lambda + API + integrations).

Outputs:
  OIDCProviderArn:
    Description: ARN of the GitHub OIDC Provider
    Value: !Ref GitHubOIDCProvider
    Export:
      Name: Hojadevida-GitHubOIDCProviderArn

  OIDCRoleArn:
    Description: ARN of the GitHub OIDC Role
    Value: !GetAtt GitHubOIDCProviderRole.Arn
    Export:
      Name: Hojadevida-GitHubOIDCRoleArn

  ECRRepositoryUri:
    Description: URI of the ECR repository
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: Hojadevida-ECRRepositoryUri

  # Terraform State Outputs
  TerraformStateDevBucketName:
    Description: Name of the dev Terraform state bucket
    Value: !Ref TerraformStateDevBucket
    Export:
      Name: Hojadevida-TerraformStateDevBucket

  TerraformStateProdBucketName:
    Description: Name of the prod Terraform state bucket
    Value: !Ref TerraformStateProdBucket
    Export:
      Name: Hojadevida-TerraformStateProdBucket

  TerraformLocksDevTableName:
    Description: Name of the dev Terraform locks table
    Value: !Ref TerraformLocksDevTable
    Export:
      Name: Hojadevida-TerraformLocksDevTable

  TerraformLocksProdTableName:
    Description: Name of the prod Terraform locks table
    Value: !Ref TerraformLocksProdTable
    Export:
      Name: Hojadevida-TerraformLocksProdTable

  # API Gateway Outputs
  # NOTE: API Gateway endpoints are now provided by AWS SAM (backend/template.yaml)
  # After SAM deployment, retrieve the API endpoint from SAM stack outputs:
  #   aws cloudformation describe-stacks --stack-name hojadevida-backend-{env} --query 'Stacks[0].Outputs' --region us-east-1
