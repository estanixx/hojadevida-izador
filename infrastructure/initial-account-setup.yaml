AWSTemplateFormatVersion: 2010-09-09
Description: >
  Initial account setup for hojadevida-izador:
  - GitHub OIDC Provider and Role for CI/CD
  - ECR Repository for frontend Docker images
  - Terraform state S3 buckets (dev & prod)
  - Terraform state DynamoDB lock tables (dev & prod)
  - SAM artifact S3 buckets (dev & prod)

Parameters:
  GitHubOrg:
    Type: String
    Description: The GitHub organization name
    Default: estanixx
  GitHubRepo:
    Type: String
    Description: The GitHub repository name
    Default: hojadevida-izador
  ECRRepositoryName:
    Type: String
    Description: Name of the ECR repository for the frontend application
    Default: hojadevida-frontend
  AccountId:
    Type: String
    Description: AWS Account ID
    Default: '871696174477'

Resources:
  # ============================================================================
  # 1. GitHub OIDC Provider and Role for CI/CD
  # ============================================================================

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com

  GitHubOIDCProviderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubOIDCRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # ============================================================================
  # 2. ECR Repository for Frontend
  # ============================================================================

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ECRRepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true

  # ============================================================================
  # 3. Terraform State Infrastructure (Dev & Prod)
  # ============================================================================
  # NOTE: Terraform state S3 buckets and DynamoDB lock tables are created
  # manually and managed outside CloudFormation to avoid conflicts.
  # They are referenced by Terraform via environment-specific backend configs.

  # ============================================================================
  # 4. SAM Artifact Buckets (Dev & Prod)
  # ============================================================================
  # S3 buckets for SAM to store Lambda deployment artifacts during sam deploy
  # Referenced in sam deploy command via --s3-bucket parameter

  SAMArtifactDevBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'hojadevida-sam-artifacts-${AccountId}-dev'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Purpose
          Value: SAM-Artifacts
        - Key: Environment
          Value: dev

  SAMArtifactProdBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'hojadevida-sam-artifacts-${AccountId}-prod'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Purpose
          Value: SAM-Artifacts
        - Key: Environment
          Value: prod

Outputs:
  OIDCProviderArn:
    Description: ARN of the GitHub OIDC Provider
    Value: !GetAtt GitHubOIDCProvider.Arn
    Export:
      Name: Hojadevida-GitHubOIDCProviderArn

  OIDCRoleArn:
    Description: ARN of the GitHub OIDC Role
    Value: !GetAtt GitHubOIDCProviderRole.Arn
    Export:
      Name: Hojadevida-GitHubOIDCRoleArn

  ECRRepositoryUri:
    Description: URI of the ECR repository
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: Hojadevida-ECRRepositoryUri

  # SAM Artifact Bucket Outputs
  SAMArtifactDevBucketName:
    Description: Name of the dev SAM artifact bucket
    Value: !Ref SAMArtifactDevBucket
    Export:
      Name: Hojadevida-SAMArtifactDevBucket

  SAMArtifactProdBucketName:
    Description: Name of the prod SAM artifact bucket
    Value: !Ref SAMArtifactProdBucket
    Export:
      Name: Hojadevida-SAMArtifactProdBucket
